default_environment: dev
project_id: 019eb668-f03f-7aee-bd19-216d6bc3bb7e
environments:
- name: dev
- name: staging
- name: prod
plugins:
  extractors:
  - name: tap-csv
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-csv.git
    config:
      files:
      - entity: test
        path: test.csv
        keys: []
  - name: tap-infoclimat
    namespace: tap_infoclimat
    pip_url: tap-rest-api-msdk
    executable: tap-rest-api-msdk
    config:
      api_url: https://www.infoclimat.fr/opendata/
      start_date: "2026-06-07T00:00:00Z"
      params:
        version: "2"
        method: get
        format: json
        token: $TAP_INFOCLIMAT_TOKEN
        # BUGFIX : les dates start/end etaient figees au 07-14 juin 2026,
        # donc la "synchro toutes les 10 min" rejouait toujours la meme semaine.
        # Elles sont maintenant injectees par variables d'environnement, ex :
        #   export INFOCLIMAT_START=$(date -u -d '7 days ago' +%F)
        #   export INFOCLIMAT_END=$(date -u +%F)
        # (a poser dans .env ou dans le scheduler ECS/cron avant `meltano run`)
        start: $INFOCLIMAT_START
        end: $INFOCLIMAT_END
      streams:
      - name: bergues
        path: "?stations[]=000R5"
        records_path: "$.hourly.\"000R5\"[*]"
        primary_keys: ["dh_utc"]
        replication_key: dh_utc
        schema: schemas/bergues.json
      - name: hazebrouck
        path: "?stations[]=STATIC0010"
        records_path: "$.hourly.\"STATIC0010\"[*]"
        primary_keys: ["dh_utc"]
        replication_key: dh_utc
        schema: schemas/hazebrouck.json
  loaders:
  - name: target-postgres
    variant: meltanolabs
    pip_url: meltanolabs-target-postgres
    config:
      host: localhost
      port: 5432
      database: forecast_db
      user: forecast_user
      password: forecast_pass
      default_target_schema: raw_infoclimat
