version: 2

models:
  - name: dim_weather_stations
    description: "Dimension des stations météorologiques (InfoClimat et Weather Underground)"
    columns:
      - name: station_key
        description: "Clé technique unique de la station"
        tests:
          - unique
          - not_null
      - name: station_id
        description: "Identifiant officiel de la station dans son réseau d'origine"
        tests:
          - unique
          - not_null
      - name: network
        description: "Réseau d'origine de la station"
        tests:
          - accepted_values:
              values: ['infoclimat', 'weather_underground']

  - name: fct_weather_observations
    description: "Table de faits des observations météo, une ligne par relevé et par station"
    tests:
      # CORRECTION : garantit "une ligne par relevé et par station" (aucun test
      # ne protégeait contre les doublons live/historique ou les relances de scripts)
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - station_key
            - observed_at_utc
    columns:
      - name: station_key
        description: "Clé de la station, référence à dim_weather_stations"
        tests:
          - not_null
          - relationships:
              to: ref('dim_weather_stations')
              field: station_key
      - name: observed_at_utc
        description: "Horodatage UTC du relevé météo"
        tests:
          - not_null
      - name: temperature_celsius
        description: "Température en degrés Celsius (plage plausible pour le climat des Hauts-de-France : -25°C à 45°C)"
        tests:
          - dbt_utils.accepted_range:
              min_value: -25
              max_value: 45
      - name: humidity_percent
        description: "Humidité relative en pourcentage (0 à 100)"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: pressure_hpa
        description: "Pression atmosphérique en hPa (plage plausible au niveau de la mer : 870 à 1085 hPa)"
        tests:
          - dbt_utils.accepted_range:
              min_value: 870
              max_value: 1085
      - name: wind_speed_kmh
        description: "Vitesse moyenne du vent en km/h (plage plausible : 0 à 250 km/h)"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 250
      - name: uv_index
        description: "Indice UV (plage standard : 0 à 16)"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 16